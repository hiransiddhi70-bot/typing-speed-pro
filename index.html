<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome Icons for UI -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header & Theme Toggle -->
        <header>
            <h1><i class="fa-solid fa-keyboard"></i> Typing Speed Pro</h1>
            <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
        </header>

        <!-- Stats Dashboard -->
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">WPM</span>
                <span id="wpm" class="stat-value">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">CPM</span>
                <span id="cpm" class="stat-value">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Accuracy</span>
                <span id="accuracy" class="stat-value">100%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Mistakes</span>
                <span id="mistakes" class="stat-value">0</span>
            </div>
            <div class="stat-card highlight">
                <span class="stat-label">Best WPM</span>
                <span id="best-score" class="stat-value">0</span>
            </div>
        </div>

        <!-- Controls (Timer Selection) -->
        <div class="controls">
            <div class="timer-modes">
                <button class="time-btn active" data-time="15">15s</button>
                <button class="time-btn" data-time="30">30s</button>
                <button class="time-btn" data-time="60">60s</button>
            </div>
            <div class="countdown-display">
                Time Left: <span id="timer">15</span>s
            </div>
        </div>

        <!-- Typing Area -->
        <div class="typing-box">
            <!-- Hidden Input for actual typing focus -->
            <input type="text" id="keyboard-input" class="hidden-input" autocomplete="off" autofocus>
            <div id="text-display" class="text-display"></div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button id="restart-btn" class="btn"><i class="fa-solid fa-rotate-right"></i> Restart Test</button>
        </div>

        <!-- Test History Section -->
        <div class="history-section">
            <h3><i class="fa-solid fa-history"></i> Test History</h3>
            <ul id="history-list" class="history-list">
                <!-- History items will be added here via JS -->
            </ul>
        </div>
    </div>

    <!-- Scripts -->
    <script src="paragraphs.js"></script>
    <script src="script.js"></script>
</body>
</html>
